<!DOCTYPE html>
<html>
<head>
  <title>Castle Defense</title>
  <style>
    body { margin: 0; overflow: hidden; background: #222; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Castle
const castle = {
  x: 50,
  y: canvas.height / 2 - 40,
  width: 60,
  height: 80
};

// Archer
const archer = {
  x: castle.x + 60,
  y: castle.y + 40,
  fireRate: 1000 / 3, // 3 arrows per second
  lastShot: 0
};

// Arrows
let arrows = [];

// Enemies
let enemies = [];
let wave = 1;

// Spawn wave
function spawnWave() {
  for (let i = 0; i < 10; i++) {
    enemies.push({
      x: canvas.width + i * 50,
      y: canvas.height / 2 + (Math.random() * 100 - 50),
      speed: 1 + Math.random(),
      health: 1
    });
  }
}

spawnWave();

// Shoot arrows
function shootArrow(time) {
  if (time - archer.lastShot > archer.fireRate) {
    arrows.push({
      x: archer.x,
      y: archer.y,
      speed: 6,
      damage: 4
    });
    archer.lastShot = time;
  }
}

// Update game
function update(time) {
  shootArrow(time);

  // Move arrows
  arrows.forEach(a => a.x += a.speed);

  // Move enemies
  enemies.forEach(e => e.x -= e.speed);

  // Collision
  arrows.forEach(a => {
    enemies.forEach(e => {
      if (
        a.x > e.x &&
        a.x < e.x + 10 &&
        a.y > e.y &&
        a.y < e.y + 20
      ) {
        e.health -= a.damage;
        a.hit = true;
      }
    });
  });

  // Remove dead enemies/arrows
  enemies = enemies.filter(e => e.health > 0 && e.x > 0);
  arrows = arrows.filter(a => !a.hit && a.x < canvas.width);

  // Next wave
  if (enemies.length === 0) {
    wave++;
    spawnWave();
  }
}

// Draw game
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Castle
  ctx.fillStyle = "gray";
  ctx.fillRect(castle.x, castle.y, castle.width, castle.height);

  // Archer
  ctx.fillStyle = "blue";
  ctx.fillRect(archer.x, archer.y, 10, 10);

  // Arrows
  ctx.fillStyle = "yellow";
  arrows.forEach(a => {
    ctx.fillRect(a.x, a.y, 8, 2);
  });

  // Enemies (stickmen)
  ctx.strokeStyle = "white";
  enemies.forEach(e => {
    // Head
    ctx.beginPath();
    ctx.arc(e.x, e.y, 5, 0, Math.PI * 2);
    ctx.stroke();

    // Body
    ctx.beginPath();
    ctx.moveTo(e.x, e.y + 5);
    ctx.lineTo(e.x, e.y + 15);
    ctx.stroke();

    // Arms
    ctx.beginPath();
    ctx.moveTo(e.x - 5, e.y + 10);
    ctx.lineTo(e.x + 5, e.y + 10);
    ctx.stroke();

    // Legs
    ctx.beginPath();
    ctx.moveTo(e.x, e.y + 15);
    ctx.lineTo(e.x - 5, e.y + 20);
    ctx.moveTo(e.x, e.y + 15);
    ctx.lineTo(e.x + 5, e.y + 20);
    ctx.stroke();
  });

  // Wave text
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Wave: " + wave, 20, 30);
}

// Game loop
function loop(time) {
  update(time);
  draw();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
